<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Acquire</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div class="masthead">
          <div>
            <h1>Acquire</h1>
          </div>
          <div id="status-pill" class="status-pill">Waiting</div>
        </div>

        <div id="join-view" class="join-view">
          <form id="join-form" class="form-row">
            <label for="player-name">Player name</label>
            <div class="inline-controls">
              <input id="player-name" name="player_name" autocomplete="name" maxlength="32" required>
              <button type="submit">Join</button>
            </div>
          </form>
        </div>

        <div id="player-view" class="player-view hidden">
          <p class="signed-in">Playing as <strong id="current-player-name"></strong></p>
          <div class="actions">
            <button id="start-button" type="button">Start Game</button>
            <button id="leave-button" class="secondary" type="button">Leave</button>
          </div>
        </div>

        <p id="message" class="message" role="status"></p>

        <section class="players-section" aria-labelledby="players-heading">
          <div class="section-header">
            <h2 id="players-heading">Players</h2>
            <span id="player-count">0 / 4</span>
          </div>
          <ol id="players" class="players"></ol>
        </section>

        <section id="started-view" class="started-view hidden">
          <div class="game-layout">
            <section class="turn-card" aria-labelledby="actions-heading">
              <h2 id="actions-heading">Turn</h2>
              <div id="game-actions" class="game-actions"></div>
            </section>

            <section class="board-panel" aria-labelledby="board-heading">
              <div class="section-header">
                <h2 id="board-heading">Board</h2>
              </div>
              <div id="board" class="board" aria-label="Acquire board"></div>
            </section>

            <section class="chains-panel" aria-labelledby="chains-heading">
              <h2 id="chains-heading">Chains</h2>
              <table class="chains-table">
                <thead>
                  <tr>
                    <th scope="col">Chain</th>
                    <th scope="col">Price</th>
                    <th scope="col">Left</th>
                    <th scope="col">Owned</th>
                  </tr>
                </thead>
                <tbody id="chains"></tbody>
              </table>
            </section>
          </div>
        </section>
      </section>
    </main>

    <script>
      window.INITIAL_LOBBY = {{ snapshot | tojson }};
      window.INITIAL_GAME = {{ game_snapshot | tojson }};
    </script>
    <script src="{{ url_for('static', path='/lobby.js') }}"></script>
  </body>
</html>
